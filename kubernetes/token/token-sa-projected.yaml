apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-reader
  namespace: secure-apps
automountServiceAccountToken: false
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  namespace: secure-apps
spec:
  containers:
  - image: nginx
    name: nginx
    volumeMounts:
    - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      name: vault-token
  serviceAccountName: api-reader
  volumes:
  - name: vault-token
    projected:
      sources:
      - serviceAccountToken:
          path: vault-token
          expirationSeconds: 3600
          audience: vault

