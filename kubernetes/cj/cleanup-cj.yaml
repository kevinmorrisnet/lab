apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup-job
  namespace: default
spec:
  jobTemplate:
    metadata:
      name: cleanup-job
    spec:
      completions: 3
      parallelism: 1
      backoffLimit: 2
      template:
        metadata: {}
        spec:
          containers:
          - command:
            - echo
            - cleanup
            image: busybox
            name: cleanup-job
          restartPolicy: OnFailure
  schedule: 0 * * * *
