apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: icmp-rule
spec:
  endpointSelector:
    matchLabels:
      type: transmitter
  egressDeny:
  - toEndpoints:
    - matchLabels:
        type: database
    icmps:
    - fields:
      - type: 8
        family: IPv4
      - type: EchoRequest
        family: IPv6

