apiVersion: v1
kind: Pod
metadata:
  name: app
spec:
  terminationGracePeriodSeconds: 30
  containers:
  - name: app
    image: busybox
    lifecycle:
      postStart:
        exec:
          command: ["/bin/sh", "-c", "echo ready > /tmp/ready.txt "]
      preStop:
        exec:
          command: ["/bin/sh","-c", "sleep 10"]
