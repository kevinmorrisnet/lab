apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kevin-ds
  namespace: kube-system
  labels:
    app: kevin
spec:
  selector:
    matchLabels:
      name: kevin
  template:
    metadata:
      labels:
        name: kevin
    spec:
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      containers:
      - name: fluentd-elasticsearch
        image: quay.io/fluentd_elasticsearch/fluentd:v5.0.1
        resources:
          limits:
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 200Mi
        volumeMounts:
        - name: varlog
          mountPath: /var/log
      priorityClassName: kevin-high
      volumes:
      - name: varlog
        hostPath:
          path: /var/log

