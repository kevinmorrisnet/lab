apiVersion: batch/v1
kind: Job
metadata:
  name: neb-new-job
  namespace: neptune
spec:
  completions: 3
  parallelism: 2
  template:
    metadata:
      labels:
        id: awesome-job
    spec:
      containers:
      - image: busybox:1.31.0
        name: neb-new-job-container
        command: ["sh", "-c", "sleep 2 && echo done"]
      restartPolicy: Never

