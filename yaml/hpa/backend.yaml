apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kkapp-hpa
spec:
  maxReplicas: 10
  metrics: 
  - resource:
      name: cpu
      target:
        averageUtilization: 50
        type: Utilization
    type: Resource
  minReplicas: 2
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kkapp-deploy
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
