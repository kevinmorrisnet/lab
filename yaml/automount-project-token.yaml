apiVersion: v1
kind: Pod
metadata:
  name: nginx
  namespace: team-blue
spec:
  containers:
  - image: nginx
    name: nginx
    volumeMounts:
    - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      name: vault-token
  serviceAccountName: mysa
  volumes:
  - name: vault-token
    projected:
      sources:
      - serviceAccountToken:
          path: vault-token
          expirationSeconds: 7200
          audience: vault
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mysa
  namespace: team-blue
automountServiceAccountToken: false

