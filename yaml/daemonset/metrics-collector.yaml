apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: metrics-collector
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: metrics
  template:
    metadata:
      labels:
        app: metrics
    spec:
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      containers:
      - name: metrics
        image: prom/node-exporter:latest
