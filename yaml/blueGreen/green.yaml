apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: myapp
  name: green-new
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
      version: green
  template:
    metadata:
      labels:
        app: myapp
        version: green
    spec:
      containers:
      - image: nginx
        name: nginx
